name: Linkspector Issue Creator
on:
  push:
    branches:
      - main # Change this to 'master' if that is your default branch
  schedule:
    - cron: '0 0 * * 1' 
  workflow_dispatch: # Keeps the manual "Run workflow" button in the UI

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js runtime
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 1. Cache the global node_modules directory
      - name: Cache Global Linkspector
        id: cache-linkspector
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/node_modules
          key: ${{ runner.os }}-global-linkspector-0.5.5

      # 2. Install only if a cache miss occurs
      - name: Install Linkspector Globally
        if: steps.cache-linkspector.outputs.cache-hit != 'true'
        run: npm install -g @umbrelladocs/linkspector@0.5.5

      # 3. Execute directly from the global path
      - name: Run Linkspector
        run: linkspector check

      - name: Run Linkspector and Capture Output
        id: linkspector
        # Run Linkspector via npm and pipe the terminal output to a text file.
        # The bash fallback prevents the workflow from crashing if broken links are found.
        run: |
          npx @umbrelladocs/linkspector@0.5.5 check > linkspector-report.txt || echo "links_failed=true" >> $GITHUB_ENV

      - name: Format Issue Body
        if: env.links_failed == 'true'
        run: |
          echo "## 🔗 Broken Links Detected" > issue_body.md
          echo "Linkspector found the following broken links:" >> issue_body.md
          echo "\`\`\`text" >> issue_body.md
          cat linkspector-report.txt >> issue_body.md
          echo "\`\`\`" >> issue_body.md

      - name: Create GitHub Issue
        if: env.links_failed == 'true'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "Action Required: Broken Links Detected"
          content-filepath: ./issue_body.md
          labels: "broken link, documentation"